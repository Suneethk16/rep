server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=rep"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - source_labels: [__meta_docker_compose_service]
        target_label: service
    pipeline_stages:
      # Try to parse JSON logs (structlog from backend/celery)
      - json:
          expressions:
            level: level
            event: event
            request_id: request_id
      - labels:
          level:
          event:
      # Drop noisy health-check lines
      - drop:
          expression: ".*(GET /health|GET /metrics).*"
