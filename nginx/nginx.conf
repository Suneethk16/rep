upstream rep_backend {
    server backend:8000;
    keepalive 32;
}

upstream rep_frontend {
    server frontend:80;
    keepalive 32;
}

# Rate-limit auth endpoints to blunt credential-stuffing.
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;
    server_tokens off;

    # Baseline security headers. CSP is intentionally loose for dev — tighten in prod.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Edge health endpoint — bypasses upstreams so probes stay green during deploys.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # FastAPI interactive docs + OpenAPI JSON.
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://rep_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — tighter rate limit.
    location ^~ /api/v1/auth/ {
        limit_req zone=auth_zone burst=20 nodelay;
        proxy_pass http://rep_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # All other API traffic.
    location /api/ {
        proxy_pass http://rep_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Admin-uploaded product images (served directly by FastAPI StaticFiles).
    location /uploads/ {
        proxy_pass http://rep_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else: SPA served by the frontend container (its own nginx).
    location / {
        proxy_pass http://rep_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
