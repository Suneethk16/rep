name: rep

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-development}
  DEBUG: ${DEBUG:-false}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  CORS_ORIGINS: ${CORS_ORIGINS:-[]}
  FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-}
  FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  STRIPE_CURRENCY: ${STRIPE_CURRENCY:-inr}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rep}
      POSTGRES_DB: ${POSTGRES_DB:-rep}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rep} -d ${POSTGRES_DB:-rep}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [rep-net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [rep-net]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    command:
      - /bin/sh
      - -c
      - |
        alembic upgrade head && \
        gunicorn app.main:app \
          --worker-class uvicorn.workers.UvicornWorker \
          --workers 2 \
          --bind 0.0.0.0:8000 \
          --access-logfile - \
          --error-logfile -
    expose:
      - "8000"
    ports:
      # Host-exposed for local Vite dev (Vite proxy → http://localhost:8000).
      # In pure-compose / prod runs, the nginx service fronts the backend via the internal network.
      - "${BACKEND_DEV_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [rep-net]

  celery-worker:
    build:
      context: ./backend
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    networks: [rep-net]

  frontend:
    build:
      context: ./frontend
      args:
        # Empty means "same origin" — the browser calls /api/* on the nginx proxy.
        VITE_API_BASE_URL: ""
        VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    expose:
      - "80"
    networks: [rep-net]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks: [rep-net]

  # ── Monitoring stack ──────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [rep-net]

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on: [prometheus, loki]
    networks: [rep-net]

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks: [rep-net]

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on: [loki]
    networks: [rep-net]

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks: [rep-net]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-rep}:${POSTGRES_PASSWORD:-rep}@postgres:5432/${POSTGRES_DB:-rep}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks: [rep-net]

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  rep-net:
    driver: bridge
